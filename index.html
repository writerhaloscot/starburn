<body>

    <!-- STARBURN: Randomized game. -->
    <div id="starwelcome">
        <h1>Starburn</h1>
        <p>Welcome to the end of the universe.
            <br />Be a black hole. Eat all the stars.
        </p>
        <!-- <p>Let no one escape you.</p> -->
        <hr>
        <p>Move the black hole with your mouse or finger.
            <br />Turn off low power mode for best visuals.
        </p>
        <hr>
        <form action="/action_page.php" autocomplete="off">
            <div class="form-row">
                <div class="form-col">
                    <label for="numstars">Number of Stars:</label>
                    <select name="numstars" id="numstars" tabindex="0" autocomplete="off">
                        <option value="50">50</option>
                        <option value="100">100</option>
                        <option value="200">200</option>
                        <option value="400">400</option>
                        <option value="700">700</option>
                    </select>
                </div>
                <div class="form-col">
                    <label for="bhsize">Black Hole Size:</label>
                    <select name="bhsize" id="bhsize" tabindex="0" autocomplete="off">
                        <option value="normal" selected>Normal</option>
                        <option value="big">Big</option>
                        <option value="massive">Massive</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-col">
                    <label for="starvid"><input type="checkbox" id="starvid" name="starvid" autocomplete="off"> Turn Off Video?</label>
                </div>
                <div class="form-col">
                    <label for="starsong">Play Music?</label>
                    <select name="starsong" id="starsong" tabindex="0" autocomplete="off">
                        <option value="no" selected>No</option>
                        <option value="sadpiano-5688.mp3">Piano</option>
                        <option value="chillguitar-5642.mp3">Guitar</option>
                        <option value="calm-110241.mp3">Calm</option>
                        <option value="forestlullaby-110624.mp3">Lullaby</option>
                        <option value="foreboding-10376.mp3">Foreboding</option>
                        <option value="chillelectronic-217007.mp3">Electronic</option>
                        <option value="emopop-351436.mp3">Emo Pop</option>
                        <option value="cinhiphop-315904.mp3">Heavy Beat</option>
                        <option value="cinmodern-491630.mp3">Cinematic</option>
                        <option value="cyberpunk-469493.mp3">Cyberpunk</option>
                        <option value="citycafe-159065.mp3">City Cafe</option>
                        <option value="jazz-525518.mp3">Smooth Jazz</option>
                        <option value="swing-377648.mp3">Swing</option>
                        <option value="bigband-132244.mp3">Big Band</option>
                    </select>
                </div>
            </div>
            <p><small>Royalty-free, no-copyright songs and videos from <a href=" https://pixabay.com" target="_blank" aria label="Pixabay (opens in a new tab)">Pixabay</a>.</small></p>
            <button id="starstart">Begin</button>
        </form>
    </div>

    <div id="starburn">
        <div id="blackhole">&bull;</div>
        <div id="starcounter">You have eaten: <span id="starnum">0</span> out of <span id="startotal">0</span> stars.</div>
    </div>

    <video id="starloop" class="starvideo" muted loop autoplay playsinline poster="media/vid-loop-min.jpg">
        <source data-src="media/vid-loop-min.mp4" type="video/mp4">
    </video>

    <div id="stargallery">
        <video class="starvideo" muted loop autoplay playsinline>
            <source data-src="media/vid-starburn-min.mp4" type="video/mp4">
        </video>
    </div>

    <!-- SCRIPTS -->
    <script src="js/jquery-4.0.0.min.js"></script>
    <script src="js/app.js?v=1.29"></script>

</body>

</html>
